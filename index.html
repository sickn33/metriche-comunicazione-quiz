<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz Metriche della Comunicazione</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --panel: #ffffff;
      --panel-2: #eef2ea;
      --text: #172018;
      --muted: #657066;
      --line: #d9e0d6;
      --accent: #256f5c;
      --accent-2: #b8552c;
      --good: #1b7a4b;
      --bad: #b43c38;
      --focus: #f2c14e;
      --shadow: 0 18px 45px rgba(29, 46, 34, 0.12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(37, 111, 92, 0.08), transparent 260px),
        var(--bg);
      color: var(--text);
    }

    button,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: var(--radius);
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    button:hover { border-color: #9caf9e; }
    button:active { transform: translateY(1px); }
    button:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(242, 193, 78, 0.55);
      outline-offset: 2px;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.danger {
      color: var(--bad);
    }

    button.ghost {
      background: transparent;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      max-width: 760px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
      align-items: start;
    }

    .card,
    .side {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card {
      overflow: hidden;
    }

    .question-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfcfa);
    }

    .section-label {
      display: none;
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .question-count {
      display: none;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .progress {
      height: 8px;
      background: #e4eadf;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #59a78f);
      transition: width 220ms ease;
    }

    .question-body {
      padding: 24px;
    }

    .question-text {
      margin: 0 0 22px;
      font-size: clamp(21px, 2.4vw, 30px);
      line-height: 1.25;
      letter-spacing: 0;
      max-width: 920px;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

      .answer {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: center;
      width: 100%;
      min-height: 58px;
      padding: 12px 14px;
      text-align: left;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
    }

      .answer .letter {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--panel-2);
      color: var(--accent);
      font-weight: 800;
    }

    .answer.correct {
      border-color: rgba(27, 122, 75, 0.55);
      background: rgba(27, 122, 75, 0.08);
    }

    .answer.correct .letter {
      background: var(--good);
      color: #fff;
    }

    .answer.wrong {
      border-color: rgba(180, 60, 56, 0.55);
      background: rgba(180, 60, 56, 0.08);
    }

    .answer.wrong .letter {
      background: var(--bad);
      color: #fff;
    }

    .feedback {
      min-height: 32px;
      margin: 18px 0 0;
      color: var(--muted);
      font-weight: 650;
    }

    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      padding: 18px 24px 24px;
      border-top: 1px solid var(--line);
    }

    .side {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .control {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    .control label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    select {
      width: 100%;
      min-height: 42px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
    }

    .toggles {
      display: grid;
      gap: 8px;
      margin: 16px 0;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .mini-title {
      margin: 18px 0 8px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .topic-list {
      display: grid;
      gap: 7px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .topic-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      line-height: 1.25;
      color: var(--muted);
    }

    .topic-meter {
      width: 64px;
      height: 7px;
      border-radius: 999px;
      background: #e6ebe2;
      overflow: hidden;
    }

    .topic-meter span {
      display: block;
      height: 100%;
      background: var(--accent-2);
    }

    .review {
      margin-top: 18px;
      display: none;
    }

    .review.visible {
      display: block;
    }

    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
      max-height: 320px;
      overflow: auto;
      padding-right: 4px;
    }

    .review-item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      padding: 10px;
      font-size: 13px;
      line-height: 1.35;
    }

    .review-item button {
      margin-top: 8px;
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 900px) {
      .topbar,
      .layout,
      .question-head {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .side {
        position: static;
      }

      .question-count {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Quiz Metriche della Comunicazione</h1>
        <p class="subhead">Quiz da 50 domande pescate casualmente dalla banca NotebookLM da 1210, con correzione immediata e nuovo giro random quando vuoi.</p>
      </div>
      <div class="toolbar">
        <button id="restartBtn" type="button">Nuovo quiz</button>
        <button id="reviewModeBtn" type="button">Ripassa errori</button>
      </div>
    </header>

    <section class="layout" aria-label="Quiz interattivo">
      <article class="card">
        <div class="question-head">
          <div>
            <p class="section-label" id="sectionLabel"></p>
            <p class="question-text" id="questionText"></p>
          </div>
          <div class="question-count" id="questionCount"></div>
        </div>
        <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
        <div class="question-body">
          <div class="answers" id="answers"></div>
          <p class="feedback" id="feedback" aria-live="polite"></p>
        </div>
        <div class="card-actions">
          <button id="prevBtn" type="button">Indietro</button>
          <div>
            <button id="revealBtn" type="button" class="ghost">Mostra risposta</button>
            <button id="nextBtn" type="button" class="primary">Avanti</button>
          </div>
        </div>
      </article>

      <aside class="side" aria-label="Controlli e risultati">
        <div class="stat-grid">
          <div class="stat"><strong id="scoreStat">0</strong><span>Corrette</span></div>
          <div class="stat"><strong id="percentStat">0%</strong><span>Precisione</span></div>
          <div class="stat"><strong id="doneStat">0</strong><span>Risposte</span></div>
          <div class="stat"><strong id="leftStat">50</strong><span>Da fare</span></div>
        </div>

        <div class="control">
          <label for="topicFilter">Argomento</label>
          <select id="topicFilter"></select>
        </div>

        <div class="toggles">
          <label class="toggle"><input id="shuffleToggle" type="checkbox" checked> Mescola domande</label>
          <label class="toggle"><input id="unansweredToggle" type="checkbox"> Mostra solo non risposte</label>
        </div>

        <p class="mini-title">Copertura argomenti</p>
        <div class="topic-list" id="topicList"></div>

        <div class="review" id="reviewPanel">
          <p class="mini-title">Errori da ripassare</p>
          <div class="review-list" id="reviewList"></div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const rawQuiz = String.raw`
# Quiz - 100 domande a risposta multipla

Distribuzione: 1) Fondamenti 11; 2) Ricerche 11; 3) Modelli e digitale 11; 4) Monitoring/listening/sentiment 11; 5) Enti certificatori 11; 6) Modelli di valutazione 11; 7) Performance measurement e CCPM 12; 8) ROI/AVE/economia 11; 9) Intangibili e reputazione 11.

## 1. Fondamenti della misurazione

1. In un piano di comunicazione, quale ragione giustifica meglio la misurazione? A. Dimostrare che sono state prodotte molte attività. B. Collegare attività, effetti e decisioni manageriali in modo verificabile. C. Sostituire il giudizio professionale con dati automatici. D. Eliminare la necessità di obiettivi qualitativi. Risposta: B

2. Una campagna ha generato 40 articoli, ma non si sa se il pubblico abbia compreso il messaggio. Quale livello è stato misurato? A. Output. B. Out-take. C. Outcome. D. Impatto. Risposta: A

3. Quale indicatore appartiene più chiaramente agli out-take? A. Numero di comunicati inviati. B. Ricordo e comprensione del messaggio. C. Aumento delle vendite annuali. D. Valore reputazionale consolidato. Risposta: B

4. Quale affermazione distingue correttamente outcome e impatto? A. L'outcome riguarda cambiamenti nei pubblici; l'impatto riguarda il contributo agli obiettivi organizzativi. B. L'outcome è sempre economico; l'impatto è sempre mediatico. C. L'outcome misura solo output quantitativi; l'impatto misura solo ricordo. D. Outcome e impatto sono sinonimi se la campagna ha successo. Risposta: A

5. Perché è rischioso usare solo vanity metrics nella valutazione? A. Perché sono sempre false. B. Perché misurano solo canali offline. C. Perché sono numeriche ma poco decisionali. D. Perché impediscono qualsiasi confronto temporale. Risposta: C

6. Una misura usata durante una campagna per correggere messaggi e canali è soprattutto: A. Formativa. B. Sommativa. C. Rendicontativa. D. Reputazionale. Risposta: A

7. Quale esempio è più coerente con una misura sommativa? A. Numero di materiali distribuiti a un evento. B. Valutazione del capitale comunicativo consolidato nel tempo. C. Conteggio dei click dopo un post. D. Calcolo del costo di stampa dei volantini. Risposta: B

8. Una misura rendicontativa serve principalmente a: A. Migliorare un layout prima della pubblicazione. B. Dimostrare agli stakeholder il contributo della comunicazione al business. C. Scegliere il moderatore di un focus group. D. Raccogliere tutte le metriche disponibili senza selezione. Risposta: B

9. Quale sequenza descrive meglio la catena logica della misurazione? A. Impatto -> output -> out-take -> outcome. B. Output -> out-take -> outcome -> impatto. C. Outcome -> output -> impatto -> out-take. D. Out-take -> impatto -> output -> outcome. Risposta: B

10. Perché le metriche non sono mai completamente neutrali? A. Perché selezionano ciò che viene considerato importante. B. Perché tutte le metriche sono manipolate dai media. C. Perché i dati quantitativi non esistono nella comunicazione. D. Perché ogni metrica misura automaticamente il ROI. Risposta: A

11. Quale uso della misurazione è metodologicamente più debole? A. Collegare KPI agli obiettivi del piano. B. Interpretare i dati nel loro contesto. C. Attribuire impatto solo perché aumentano gli output. D. Combinare dati qualitativi e quantitativi. Risposta: C

## 2. Ricerche in comunicazione

12. Quando è più adatto un approccio qualitativo? A. Quando si vuole esplorare motivazioni e significati non ancora chiari. B. Quando si vuole ottenere una stima statisticamente generalizzabile subito. C. Quando si vuole eliminare ogni interpretazione soggettiva. D. Quando si misura esclusivamente la tiratura della stampa. Risposta: A

13. Quale limite va ricordato nella ricerca qualitativa? A. Non può generare ipotesi. B. Non produce profondità interpretativa. C. Non è automaticamente generalizzabile statisticamente. D. Non può essere usata nella comunicazione. Risposta: C

14. In una ricerca causale, il gruppo di controllo serve a: A. Aumentare il numero di output prodotti. B. Confrontare esposti e non esposti. C. Sostituire l'analisi dei dati. D. Rendere qualitativo un questionario. Risposta: B

15. Una survey standardizzata su un campione ampio è tipicamente: A. Qualitativa. B. Quantitativa. C. Partecipante. D. Narrativa. Risposta: B

16. Qual è il valore distintivo del focus group rispetto a interviste individuali? A. La possibilità di evitare qualsiasi influenza sociale. B. Interazione che mostra consenso e dissenso. C. La certezza di ottenere dati rappresentativi dell'intera popolazione. D. L'assenza di moderazione. Risposta: B

17. In un focus group aziendale, perché è meglio evitare rapporti gerarchici diretti tra partecipanti? A. Perché rendono impossibile registrare l'audio. B. Perché possono condizionare spontaneità e libertà di espressione. C. Perché trasformano la ricerca in una survey. D. Perché aumentano automaticamente la validità statistica. Risposta: B

18. L'osservazione partecipante è più correttamente descritta come: A. Analisi di dati già pubblicati. B. Immersione nel contesto naturale del gruppo. C. Intervista telefonica assistita da computer. D. Conteggio delle visualizzazioni social. Risposta: B

19. Quale coppia distingue bene ricerca primaria e secondaria? A. Primaria raccolta ad hoc; secondaria già esistente. B. Primaria = dati vecchi; secondaria = dati sempre sperimentali. C. Primaria = solo online; secondaria = solo offline. D. Primaria = qualitativa; secondaria = causale. Risposta: A

20. Qual è una criticità tipica della ricerca secondaria? A. È sempre più costosa della primaria. B. Può essere obsoleta o poco aderente. C. Non può mai essere usata per il benchmark. D. Richiede sempre gruppi sperimentali. Risposta: B

21. Per misurare il customer journey, perché non basta osservare solo la conversione finale? A. Perché la conversione è sempre una vanity metric. B. Perché il percorso include ricerca, valutazione, esperienza e raccomandazione. C. Perché il post-acquisto non influenza mai il comportamento futuro. D. Perché il customer journey riguarda solo i media tradizionali. Risposta: B

22. Quale sequenza rappresenta meglio il comportamento d'acquisto studiato nel corso? A. Acquisto -> bisogno -> ricerca -> raccomandazione. B. Bisogno, ricerca, valutazione, scelta, esperienza, raccomandazione. C. Awareness -> tiratura -> diffusione -> impatto. D. Output -> ADS -> TER -> Auditel. Risposta: B

## 3. Modelli di comunicazione e digitale

23. Una campagna TV nazionale orientata alla notorietà e misurata con reach e GRP è soprattutto: A. ATL. B. BTL. C. TTL. D. Listening. Risposta: A

24. Quale esempio è più coerente con una logica BTL? A. Spot televisivo generalista per pubblico indifferenziato. B. Direct marketing con call to action misurata. C. Misurazione della tiratura di un quotidiano. D. Golden Rule di Auditel. Risposta: B

25. La logica TTL si caratterizza per: A. Separare rigorosamente media di massa e canali diretti. B. Integrare ATL e BTL lungo il funnel. C. Misurare solo la stampa cartacea. D. Sostituire la strategia con un singolo KPI. Risposta: B

26. Quale distinzione tra Web 3.0 e Web 4.0 è più corretta? A. Web 3.0 è statico; Web 4.0 è solo social. B. Web 3.0 struttura e interpreta dati; Web 4.0 introduce sistemi predittivi e agenti autonomi. C. Web 3.0 è la stampa digitale; Web 4.0 è la TV connessa. D. Web 3.0 coincide con i blog; Web 4.0 con i forum. Risposta: B

27. La formula “leggi, partecipi, capisce, agisce” rimanda a: A. Livelli del Yardstick Model. B. Evoluzione Web 1.0-4.0. C. Fasi ADS di certificazione. D. Tipi di capitale intellettuale. Risposta: B

28. Un insight, rispetto a un semplice dato, è: A. Un numero grezzo senza contesto. B. Interpretazione collegata a obiettivi e decisioni. C. Un output editoriale. D. Un sinonimo di follower count. Risposta: B

29. Il benchmark è importante perché: A. Rende inutile definire obiettivi. B. Dà contesto a un dato isolato. C. Misura solo l'AVE. D. Elimina ogni bisogno di analisi qualitativa. Risposta: B

30. Quando una vanity metric può diventare fuorviante? A. Quando manca trend, benchmark o obiettivo. B. Quando viene inserita in una dashboard. C. Quando riguarda il digitale. D. Quando è confrontata con un competitor. Risposta: A

31. Lo ZMOT indica principalmente: A. L'acquisto finale in negozio. B. Ricerca online prima della scelta d'acquisto. C. La misurazione della diffusione stampa. D. Il calcolo del PQII. Risposta: B

32. Nel modello PESO, i contenuti pubblicati sui canali proprietari dell'organizzazione sono: A. Paid. B. Earned. C. Shared. D. Owned. Risposta: D

33. Quale logica descrive meglio Altimeter/Owyang? A. Partire dai like per definire poi il business. B. Partire dal business e collegare metriche social. C. Misurare solo le conversazioni spontanee. D. Eliminare le metriche social dal piano. Risposta: B

## 4. Media monitoring, listening e sentiment

34. Quale differenza tra monitoring e listening è più corretta? A. Monitoring descrive; listening parte dal business. B. Monitoring è qualitativo; listening è solo conteggio automatico. C. Monitoring riguarda solo TV; listening solo stampa. D. Monitoring e listening sono sinonimi perfetti. Risposta: A

35. Un processo di listening ben impostato dovrebbe partire da: A. Tutti i messaggi raccolti senza filtro. B. Domande informative e obiettivi di business. C. Una metrica unica di volume. D. La classifica dei post più recenti. Risposta: B

36. Una mappa semantica serve soprattutto a: A. Certificare la tiratura. B. Relazioni tra topic, sentiment e nodi. C. Calcolare automaticamente il ROI. D. Sostituire il moderatore del focus group. Risposta: B

37. Un hot topic è meglio interpretato come: A. Un tema emergente nelle conversazioni. B. Un obiettivo SMART. C. Un indice di diffusione stampa. D. Una metrica finanziaria. Risposta: A

38. Nella sentiment analysis, perché è importante definire il soggetto del giudizio? A. Perché lo stesso contenuto può avere toni diversi verso soggetti diversi. B. Perché il sentiment è sempre positivo se il brand è noto. C. Perché evita la necessità di leggere il testo. D. Perché il soggetto coincide sempre con l'autore del post. Risposta: A

39. Il punto di vista del “lettore medio” nella sentiment analysis serve a: A. Valutare senza strategie o pregiudizi aziendali. B. Premiare sempre la copertura giornalistica. C. Trasformare il sentiment in GRP. D. Evitare la classificazione neutra. Risposta: A

40. Quale limite è tipico degli analytics nativi delle piattaforme social? A. Mostrano sempre i dati dei competitor. B. Cecità competitiva e frammentazione tra piattaforme. C. Misurano direttamente la reputazione totale. D. Sono sempre più profondi del listening. Risposta: B

41. Perché un commento negativo e un commento positivo non dovrebbero valere entrambi solo come “+1 engagement”? A. Perché l'engagement non esiste. B. Il volume non cattura tono e qualità. C. Perché i commenti negativi non vanno mai misurati. D. Perché solo i like sono rilevanti. Risposta: B

42. Quale rischio riguarda l'uso dell'AI nella misurazione social? A. Non può leggere grandi volumi. B. Può sbagliare ironia, slang e ambiguità. C. Impedisce il topic modeling. D. Elimina la necessità di privacy e controllo umano. Risposta: B

43. Quale pratica riduce il rischio di automazione cieca nell'analisi con AI? A. Accettare sempre il primo output del tool. B. Supervisionare con campioni e prompt strutturati. C. Rimuovere gli obiettivi di business. D. Misurare solo il numero di menzioni. Risposta: B

44. La combinazione topic + sentiment è utile perché: A. Collega tono e temi in modo azionabile. B. Elimina il bisogno di fonti. C. Trasforma ogni conversazione in ROI. D. Misura la tiratura della stampa. Risposta: A

## 5. Enti certificatori delle audience

    function pickPrompt(prompts, seed) {
      return prompts[seed % prompts.length];
    }

    function chooseDistractors(question, allQuestions, seed) {
      const correctLength = wordCount(question.correct);
      const candidates = allQuestions
        .filter(candidate => candidate.kind === question.kind && candidate.correct !== question.correct);
      const local = candidates
        .filter(candidate => candidate.section === question.section && Math.abs(wordCount(candidate.correct) - correctLength) <= 3)
        .sort((a, b) => distractorScore(a, question, correctLength, seed) - distractorScore(b, question, correctLength, seed))
        .map(candidate => candidate.correct);
      const fallback = candidates
        .filter(candidate => candidate.section !== question.section || Math.abs(wordCount(candidate.correct) - correctLength) > 3)
        .sort((a, b) => distractorScore(a, question, correctLength, seed) - distractorScore(b, question, correctLength, seed))
        .map(candidate => candidate.correct);

      return uniqueTexts([...local, ...fallback])
        .slice(0, 3);
    }

    function distractorScore(candidate, question, correctLength, seed) {
      const lengthPenalty = Math.abs(wordCount(candidate.correct) - correctLength) * 12;
      const sectionPenalty = candidate.section === question.section ? 0 : 30;
      const jitter = seededScore(candidate.correct, seed) % 7;
      return sectionPenalty + lengthPenalty + jitter;
    }

    function uniqueTexts(items) {
      return [...new Set(items)];
    }

    function wordCount(text) {
      return String(text).trim().split(/\s+/).filter(Boolean).length;
    }

    function seededScore(text, seed) {
      let hash = seed + 2166136261;
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function toQuestion(id, q) {
      return {
        id,
        section: q.section,
        text: q.text,
        options: {
          A: q.correct,
          B: q.distractors[0],
          C: q.distractors[1],
          D: q.distractors[2]
        },
        answer: "A"
      };
    }

    function init() {
      if (!questions.length) {
        console.warn("Attenzione: banca quiz vuota.");
      }

      ensureQuizSession();
      updateTopicFilter();

      els.topicFilter.addEventListener("change", () => {
        reviewOnly = false;
        index = 0;
        rebuildOrder();
        render();
      });

      els.shuffleToggle.addEventListener("change", () => {
        index = 0;
        rebuildOrder();
        render();
      });

      els.unansweredToggle.addEventListener("change", () => {
        reviewOnly = false;
        index = 0;
        rebuildOrder();
        render();
      });

      els.answers.addEventListener("click", event => {
        const button = event.target.closest("button[data-letter]");
        if (!button || !els.answers.contains(button)) return;
        choose(button.dataset.letter);
      });

      els.prevBtn.addEventListener("click", () => {
        index = Math.max(0, index - 1);
        render();
      });

      els.nextBtn.addEventListener("click", () => {
        index = Math.min(order.length - 1, index + 1);
        render();
      });

      els.revealBtn.addEventListener("click", () => {
        const q = currentQuestion();
        if (!q) return;
        state.answers[q.id] = state.answers[q.id] || { selected: null, revealed: true };
        state.answers[q.id].revealed = true;
        saveState();
        render();
      });

      els.restartBtn.addEventListener("click", () => {
        startNewQuiz();
      });

      els.reviewModeBtn.addEventListener("click", () => {
        reviewOnly = !reviewOnly;
        index = 0;
        rebuildOrder();
        render();
      });

      document.addEventListener("keydown", event => {
        if (event.target.matches("select, button, input")) return;
        const key = event.key.toUpperCase();
        if (["1", "2", "3", "4"].includes(event.key)) {
          const q = currentQuestion();
          const visibleLetter = q ? getOptionOrder(q.id)[Number(event.key) - 1] : null;
          if (visibleLetter) choose(visibleLetter);
        }
        if (event.key === "ArrowRight") els.nextBtn.click();
        if (event.key === "ArrowLeft") els.prevBtn.click();
      });

      rebuildOrder();
      render();
    }

    function ensureQuizSession() {
      const validIds = new Set(questions.map(q => q.id));
      const expectedSize = Math.min(quizSize, questions.length);
      const ids = Array.isArray(state.quizIds) ? state.quizIds : [];
      const validSession = ids.length === expectedSize && ids.every(id => validIds.has(id));

      if (!validSession) {
        state = { answers: {}, quizIds: pickQuizIds() };
        saveState();
      }
    }

    function startNewQuiz() {
      state = { answers: {}, quizIds: pickQuizIds() };
      optionOrder = {};
      order = [];
      index = 0;
      reviewOnly = false;
      els.topicFilter.value = "all";
      els.unansweredToggle.checked = false;
      els.shuffleToggle.checked = true;
      saveState();
      updateTopicFilter();
      rebuildOrder();
      render();
    }

    function pickQuizIds() {
      return shuffle(questions.map(q => q.id)).slice(0, Math.min(quizSize, questions.length));
    }

    function getActiveQuestions() {
      return state.quizIds
        .map(id => questionById.get(id))
        .filter(Boolean);
    }

    function updateTopicFilter() {
      const current = els.topicFilter.value || "all";
      const sections = [...new Set(getActiveQuestions().map(q => q.section))];
      els.topicFilter.innerHTML = `<option value="all">Tutti gli argomenti</option>` +
        sections.map(section => `<option value="${escapeHtml(section)}">${escapeHtml(cleanSection(section))}</option>`).join("");
      els.topicFilter.value = current === "all" || sections.includes(current) ? current : "all";
    }

    function rebuildOrder() {
      const topic = els.topicFilter.value;
      const onlyUnanswered = els.unansweredToggle.checked;
      const wrongIds = new Set(getWrongQuestions().map(q => q.id));

      order = getActiveQuestions()
        .filter(q => topic === "all" || q.section === topic)
        .filter(q => !onlyUnanswered || !state.answers[q.id]?.selected)
        .filter(q => !reviewOnly || wrongIds.has(q.id))
        .map(q => q.id);

      if (els.shuffleToggle.checked) {
        order = shuffle([...order]);
      }

      if (index >= order.length) index = Math.max(0, order.length - 1);
    }

    function render() {
      renderStats();
      renderTopicList();
      renderReview();

      const q = currentQuestion();
      if (!q) {
        els.sectionLabel.textContent = "Nessuna domanda";
        els.questionText.textContent = "Non ci sono domande con i filtri attuali.";
        els.questionCount.textContent = "";
        els.answers.innerHTML = "";
        els.feedback.textContent = "Cambia filtro o disattiva il ripasso errori.";
        els.feedback.className = "feedback";
        els.progressBar.style.width = "0%";
        els.prevBtn.disabled = true;
        els.nextBtn.disabled = true;
        els.revealBtn.disabled = true;
        return;
      }

      const answerState = state.answers[q.id];
      const selected = answerState?.selected;
      const revealed = answerState?.revealed || Boolean(selected);

      els.questionText.textContent = q.text;
      els.sectionLabel.textContent = cleanSection(q.section);
      els.questionCount.textContent = `Domanda ${index + 1} di ${order.length}`;
      els.progressBar.style.width = `${((index + 1) / order.length) * 100}%`;
      els.prevBtn.disabled = index === 0;
      els.nextBtn.disabled = index === order.length - 1;
      els.revealBtn.disabled = Boolean(revealed);

      const displayLetters = getOptionOrder(q.id);
      els.answers.innerHTML = displayLetters.map((letter, displayIndex) => {
        const classes = ["answer"];
        if (revealed && letter === q.answer) classes.push("correct");
        if (revealed && selected === letter && selected !== q.answer) classes.push("wrong");
        return `
          <button type="button" class="${classes.join(" ")}" data-letter="${letter}">
            <span class="letter">${displayIndex + 1}</span>
            <span>${escapeHtml(q.options[letter])}</span>
          </button>
        `;
      }).join("");

      if (!selected && !revealed) {
        els.feedback.textContent = "Scegli una risposta. Puoi usare anche i tasti 1, 2, 3, 4.";
        els.feedback.className = "feedback";
      } else if (selected === q.answer) {
        els.feedback.textContent = "Corretto.";
        els.feedback.className = "feedback good";
      } else if (revealed && !selected) {
        els.feedback.textContent = "Risposta corretta evidenziata.";
        els.feedback.className = "feedback";
      } else {
        els.feedback.textContent = "Non corretta. La risposta giusta è evidenziata.";
        els.feedback.className = "feedback bad";
      }
    }

    function choose(letter) {
      const q = currentQuestion();
      if (!q) return;
      state.answers[q.id] = {
        selected: letter,
        revealed: true
      };
      saveState();
      render();
    }

    function currentQuestion() {
      const id = order[index];
      return questionById.get(id);
    }

    function renderStats() {
      const activeQuestions = getActiveQuestions();
      const answered = activeQuestions.filter(q => state.answers[q.id]?.selected);
      const correct = answered.filter(q => state.answers[q.id].selected === q.answer);
      const percent = answered.length ? Math.round((correct.length / answered.length) * 100) : 0;

      els.scoreStat.textContent = correct.length;
      els.percentStat.textContent = `${percent}%`;
      els.doneStat.textContent = answered.length;
      els.leftStat.textContent = activeQuestions.length - answered.length;
    }

    function renderTopicList() {
      const activeQuestions = getActiveQuestions();
      const sections = [...new Set(activeQuestions.map(q => q.section))];
      els.topicList.innerHTML = sections.map(section => {
        const topicQuestions = activeQuestions.filter(q => q.section === section);
        const answered = topicQuestions.filter(q => state.answers[q.id]?.selected).length;
        const width = Math.round((answered / topicQuestions.length) * 100);
        return `
          <div class="topic-row">
            <span>${escapeHtml(cleanSection(section))} · ${answered}/${topicQuestions.length}</span>
            <span class="topic-meter"><span style="width:${width}%"></span></span>
          </div>
        `;
      }).join("");
    }

    function renderReview() {
      const wrong = getWrongQuestions();
      els.reviewPanel.classList.toggle("visible", wrong.length > 0 || reviewOnly);
      if (!wrong.length) {
        els.reviewList.innerHTML = `<p class="empty">Nessun errore registrato. Bel segnale.</p>`;
        return;
      }

      els.reviewList.innerHTML = wrong.map(q => `
        <div class="review-item">
          ${escapeHtml(q.text)}
          <br>La risposta corretta è evidenziata quando riapri la domanda.
          <button type="button" data-jump="${q.id}">Vai alla domanda</button>
        </div>
      `).join("");

      els.reviewList.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          const id = Number(button.dataset.jump);
          const existing = order.indexOf(id);
          if (existing >= 0) {
            index = existing;
          } else {
            els.topicFilter.value = "all";
            els.unansweredToggle.checked = false;
            reviewOnly = false;
            rebuildOrder();
            index = order.indexOf(id);
          }
          render();
        });
      });
    }

    function getWrongQuestions() {
      return getActiveQuestions().filter(q => {
        const selected = state.answers[q.id]?.selected;
        return selected && selected !== q.answer;
      });
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || { answers: {} };
      } catch {
        return { answers: {} };
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function getOptionOrder(questionId) {
      if (!optionOrder[questionId]) {
        optionOrder[questionId] = shuffle([...letters]);
      }
      return optionOrder[questionId];
    }

    function cleanSection(section) {
      return section.replace(/^\d+\.\s*/, "");
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
